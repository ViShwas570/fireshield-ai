<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5722;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#shieldGrad)" stroke="url(#fireGrad)" stroke-width="3"/>
  
  <!-- Shield shape -->
  <path d="M100 25 L155 50 L155 110 Q155 155 100 180 Q45 155 45 110 L45 50 Z" 
        fill="none" stroke="url(#fireGrad)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Fire flame -->
  <path d="M100 60 
           Q115 80 110 95 
           Q120 85 125 100 
           Q130 110 125 125 
           Q120 140 100 150 
           Q80 140 75 125 
           Q70 110 75 100 
           Q80 85 90 95 
           Q85 80 100 60Z" 
        fill="url(#fireGrad)" filter="url(#glow)"/>
  
  <!-- Inner flame -->
  <path d="M100 85 
           Q108 95 105 105 
           Q110 100 112 108 
           Q115 115 110 125 
           Q105 135 100 138 
           Q95 135 90 125 
           Q85 115 88 108 
           Q90 100 95 105 
           Q92 95 100 85Z" 
        fill="#FFF3E0" opacity="0.8"/>
  
  <!-- AI text -->
  <text x="100" y="178" text-anchor="middle" font-family="Arial, sans-serif" 
        font-weight="bold" font-size="12" fill="url(#fireGrad)" letter-spacing="3">
    FIRESHIELD AI
  </text>
</svg>
