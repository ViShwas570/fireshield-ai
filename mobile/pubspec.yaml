name: fireshield_ai
description: "FireShield AI — AI-Powered Fire Emergency Response App for India"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  dio: ^5.4.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  permission_handler: ^11.1.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  image_picker: ^1.0.5
  flutter_animate: ^4.3.0
  http: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
